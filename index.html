<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>★ここにホームページ名を入力★</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Noto+Serif+JP:wght@300;500;700&display=swap" rel="stylesheet">
</head>
<body>

    <header class="hero">
        <div class="hero-content">
            <h1 class="hero-title" id="typewriter">★ここにメインタイトル★</h1>
        </div>
    </header>

    <main class="container">
        
        <section class="portfolio-section fade-in">
            <h2 class="section-title"><span>★作品集の見出し★</span></h2>

            <div class="category-filter">
                <input type="radio" id="all" name="filter" checked>
                <label for="all">★すべて★</label>

                <input type="radio" id="chirashi" name="filter">
                <label for="chirashi">★チラシ・POP★</label>

                <input type="radio" id="thumb" name="filter">
                <label for="thumb">★サムネイル★</label>

                <input type="radio" id="video" name="filter">
                <label for="video">★動画編集★</label>

                <input type="radio" id="web" name="filter">
                <label for="web">★WEBサイト★</label>

                <input type="radio" id="data" name="filter">
                <label for="data">データ分析・Excel</label>

                <div class="gallery-grid">
                    
                    <div class="work-item cat-chirashi">
                        <div class="thumbnail-wrapper">
                            <img src="images/sample1.jpg" alt="作品名">
                        </div>
                        <div class="work-info">
                            <span class="category-tag">★チラシ・POP★</span>
                            <h3>★作品のタイトル★</h3>
                            <p class="tool-text">Illustrator</p>
                        </div>
                    </div>

                    <div class="work-item cat-thumb">
                        <div class="thumbnail-wrapper">
                            <img src="images/sample2.jpg" alt="作品名">
                        </div>
                        <div class="work-info">
                            <span class="category-tag">★サムネイル★</span>
                            <h3>★作品のタイトル★</h3>
                            <p class="tool-text">Photoshop</p>
                        </div>
                    </div>

                    <div class="work-item cat-video">
                        <div class="thumbnail-wrapper">
                            <img src="images/sample3.jpg" alt="作品名">
                            <div class="play-icon">▶</div>
                        </div>
                        <div class="work-info">
                            <span class="category-tag">★動画編集★</span>
                            <h3>★作品のタイトル★</h3>
                            <p class="tool-text">Premiere Pro</p>
                        </div>
                    </div>

                    <div class="work-item cat-web">
                        <a href="https://example.com" target="_blank" class="work-link">
                            <div class="thumbnail-wrapper">
                                <img src="images/sample4.jpg" alt="作品名">
                                <div class="link-overlay"><span class="link-overlay-text">★ホバー時の文字★</span></div>
                            </div>
                            <div class="work-info">
                                <span class="category-tag">★WEB制作★</span>
                                <h3>★作品のタイトル★</h3>
                                <p class="tool-text">HTML / CSS</p>
                            </div>
                        </a>
                    </div>

                    <div class="work-item cat-data">
                        <a href="https://example.com" target="_blank" class="work-link">
                            <div class="thumbnail-wrapper">
                                <img src="images/excel-sample.jpg" alt="作品名">
                                <div class="link-overlay"><span class="link-overlay-text">🔗 データを拝見</span></div>
                            </div>
                            <div class="work-info">
                                <span class="category-tag">データ分析</span>
                                <h3>フィットネス参加者推移・集客データ管理</h3>
                                <p class="tool-text">Excel / スプレッドシート</p>
                            </div>
                        </a>
                    </div>

                </div> </div> </section>
    </main>

    <footer class="footer">
        <p>&copy; 2026 ★あなたの名前★ All Rights Reserved.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
